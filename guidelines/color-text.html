<!-- @dsCard group="Colors" viewport="700x170" name="Text & Accents" subtitle="Neutral text ramp + secondary accents" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:104px;height:70px;border-radius:var(--radius-md);border:1px solid var(--line);}
  .name{font-size:12px;font-weight:700;color:var(--text-primary);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><span class="name">primary</span><span class="hex">#ffffff</span></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><span class="name">body</span><span class="hex">#c7c7d1</span></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><span class="name">muted</span><span class="hex">#9b9bab</span></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><span class="name">faint</span><span class="hex">#6f6f7e</span></div>
    <div class="sw"><div class="chip" style="background:var(--violet-500)"></div><span class="name">violet</span><span class="hex">#7209b7</span></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-400)"></div><span class="name">cyan</span><span class="hex">#4cc9f0</span></div>
  </div>
</body></html>
