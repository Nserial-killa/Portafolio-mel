<!-- @dsCard group="Colors" viewport="700x150" name="Gradients" subtitle="Brand gradients for fills & text" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:200px;height:64px;border-radius:var(--radius-md);}
  .name{font-size:12px;font-weight:700;color:var(--text-primary);}
  .desc{font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--grad-pink)"></div><span class="name">--grad-pink</span><span class="desc">buttons, chips</span></div>
    <div class="sw"><div class="chip" style="background:var(--grad-vivid)"></div><span class="name">--grad-vivid</span><span class="desc">hero accents, media</span></div>
    <div class="sw"><div class="chip" style="background:var(--grad-text)"></div><span class="name">--grad-text</span><span class="desc">gradient headlines</span></div>
  </div>
</body></html>
