<!-- @dsCard group="Colors" viewport="700x170" name="Ink & Surfaces" subtitle="The black canvas and its surfaces" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:118px;height:70px;border-radius:var(--radius-md);border:1px solid var(--line-strong);}
  .name{font-size:12px;font-weight:700;color:var(--text-primary);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--black)"></div><span class="name">black / page</span><span class="hex">#000000</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><span class="name">ink-950</span><span class="hex">#08080a</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">ink-900</span><span class="hex">#0e0e12</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><span class="name">ink-850 / card</span><span class="hex">#141419</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="name">ink-800</span><span class="hex">#1c1c23</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="name">ink-700</span><span class="hex">#2a2a33</span></div>
  </div>
</body></html>
