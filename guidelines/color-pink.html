<!-- @dsCard group="Colors" viewport="700x170" name="Brand Pink" subtitle="The signature magenta scale" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:120px;height:70px;border-radius:var(--radius-md);border:1px solid var(--line);}
  .name{font-size:12px;font-weight:700;color:var(--text-primary);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pink-300)"></div><span class="name">pink-300</span><span class="hex">#fb7bb4</span></div>
    <div class="sw"><div class="chip" style="background:var(--pink-400)"></div><span class="name">pink-400</span><span class="hex">#f94c9c</span></div>
    <div class="sw"><div class="chip" style="background:var(--pink-500);box-shadow:var(--glow-pink-sm)"></div><span class="name">pink-500 ★</span><span class="hex">#f72585</span></div>
    <div class="sw"><div class="chip" style="background:var(--pink-600)"></div><span class="name">pink-600</span><span class="hex">#d11371</span></div>
    <div class="sw"><div class="chip" style="background:var(--pink-700)"></div><span class="name">pink-700</span><span class="hex">#b5179e</span></div>
  </div>
</body></html>
