<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Corner radii from xs to pill" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:18px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:84px;height:60px;background:var(--surface-card);border:1px solid var(--border-accent);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 6</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 10</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 24</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 32</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:60px"></div><span class="lbl">pill</span></div>
  </div>
</body></html>
