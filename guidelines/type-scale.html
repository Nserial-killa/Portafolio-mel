<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="From hero to eyebrow" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-body);display:flex;flex-direction:column;gap:10px;}
  .line{display:flex;align-items:baseline;gap:16px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:64px;flex:none;}
  .d1{font-family:var(--font-display);font-weight:800;font-size:48px;color:var(--text-primary);letter-spacing:-.03em;}
  .h2{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--text-primary);}
  .lg{font-size:18px;color:var(--text-body);}
  .base{font-size:16px;color:var(--text-body);}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);}
</style></head>
<body>
  <div class="line"><span class="tag">fs-d1</span><span class="d1">Aa diseño</span></div>
  <div class="line"><span class="tag">fs-h2</span><span class="h2">Trabajo seleccionado</span></div>
  <div class="line"><span class="tag">fs-lg</span><span class="lg">Texto de introducción y leads.</span></div>
  <div class="line"><span class="tag">fs-base</span><span class="base">Texto de cuerpo para párrafos.</span></div>
  <div class="line"><span class="tag">fs-xs</span><span class="eyebrow">Eyebrow / etiqueta</span></div>
</body></html>
