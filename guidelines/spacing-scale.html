<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="8px base rhythm" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;align-items:flex-end;gap:18px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--grad-pink);border-radius:4px;width:26px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:8px"></div><span class="lbl">2·8</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lbl">4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lbl">5·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lbl">6·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lbl">7·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lbl">8·64</span></div>
    <div class="col"><div class="bar" style="height:96px"></div><span class="lbl">9·96</span></div>
  </div>
</body></html>
