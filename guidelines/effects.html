<!-- @dsCard group="Spacing" viewport="700x180" name="Glow & Shadow" subtitle="Elevation reads as pink glow on black" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:30px;background:var(--bg-page);font-family:var(--font-body);}
  .row{display:flex;gap:30px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:120px;height:74px;border-radius:var(--radius-md);background:var(--surface-card);border:1px solid var(--border);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">shadow-md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--glow-pink-sm)"></div><span class="lbl">glow-pink-sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--glow-pink-md)"></div><span class="lbl">glow-pink-md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--glow-pink-lg)"></div><span class="lbl">glow-pink-lg</span></div>
  </div>
</body></html>
